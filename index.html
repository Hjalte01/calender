<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Printable Photo Calendar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <aside class="controls" aria-label="Calendar controls">
        <nav class="control-tabs" aria-label="Control categories">
          <button class="control-tab" type="button" data-tab="main" aria-pressed="true">Main</button>
          <button class="control-tab" type="button" data-tab="style" aria-pressed="false">Style</button>
          <button class="control-tab" type="button" data-tab="family" aria-pressed="false">Family</button>
          <button class="control-tab" type="button" data-tab="events" aria-pressed="false">Events</button>
        </nav>

        <div class="control-group" data-panel="main">
          <h1>Calendar Builder</h1>
          <div class="month-row">
            <button id="previousMonthButton" class="icon-button" type="button" aria-label="Previous month">‹</button>
            <label>
              Month
              <input id="monthInput" type="month" />
            </label>
            <button id="nextMonthButton" class="icon-button" type="button" aria-label="Next month">›</button>
          </div>
          <div class="view-row" aria-label="Preview mode">
            <button id="monthViewButton" type="button" aria-pressed="true">Month</button>
            <button id="yearViewButton" type="button" aria-pressed="false">Year</button>
          </div>
          <label>
            Title
            <input id="titleInput" type="text" value="" />
          </label>
          <label>
            Photo for this month
            <input id="photoInput" type="file" accept="image/*" />
          </label>
          <button id="printButton" type="button">Print</button>
        </div>

        <div class="control-group is-hidden" data-panel="style">
          <h2>Style</h2>
          <label>
            Accent color
            <input id="accentInput" type="color" value="#bd1f2d" />
          </label>
          <label>
            Photo height
            <input id="photoHeightInput" type="range" min="22" max="42" value="32" />
          </label>
          <label class="checkbox-row">
            <input id="showWeekNumbersInput" type="checkbox" checked />
            Show week numbers
          </label>
          <label class="checkbox-row">
            <input id="hideOutsideDaysInput" type="checkbox" />
            Hide other months
          </label>
          <label class="checkbox-row">
            <input id="showMemberColorsInput" type="checkbox" checked />
            Show family colors
          </label>
        </div>

        <div class="control-group is-hidden" data-panel="family">
          <h2>Family</h2>
          <div class="family-row">
            <label>
              Name
              <input id="memberNameInput" type="text" placeholder="Name1" />
            </label>
            <label>
              Color
              <input id="memberColorInput" type="color" value="#277da1" />
            </label>
          </div>
          <button id="addMemberButton" type="button">Add family member</button>
          <ul id="memberList" class="member-list"></ul>
        </div>

        <div class="control-group is-hidden" data-panel="events">
          <h2>Events</h2>
          <label>
            For
            <select id="eventMemberInput">
              <option value="">Shared</option>
            </select>
          </label>
          <div class="event-form">
            <label>
              Year
              <input id="eventYearInput" type="number" min="1" max="9999" placeholder="2001" />
            </label>
            <label>
              Month
              <input id="eventMonthInput" type="number" min="1" max="12" placeholder="5" />
            </label>
            <label>
              Day
              <input id="eventDayInput" type="number" min="1" max="31" placeholder="13" />
            </label>
            <label>
              Flag
              <select id="eventFlagInput">
                <option value="">None</option>
              </select>
            </label>
          </div>
          <label>
            Name
            <input id="eventNameInput" type="text" placeholder="Name" />
          </label>
          <button id="addEventButton" type="button">Add event</button>
          <label>
            iPhone calendar link
            <input id="icsUrlInput" type="url" placeholder="https://pXX-caldav.icloud.com/published/..." />
          </label>
          <details class="import-options">
            <summary>Import cleanup</summary>
            <label>
              Birthday summary regex
              <input id="importRegexInput" type="text" value="^(?:[^\p{L}\p{N}]+\s*)?(?<name>.*?)(?:\s*[\(\[](?<year>\d{4})[\)\]])?\s*$" />
            </label>
            <p class="hint">Use named groups <code>?&lt;name&gt;</code> and optionally <code>?&lt;year&gt;</code>.</p>
          </details>
          <button id="importUrlButton" type="button">Import calendar link</button>
          <label>
            Import .ics
            <input id="icsInput" type="file" accept=".ics,text/calendar" />
          </label>
          <button id="clearButton" type="button">Clear events</button>
          <p id="importStatus" class="hint" role="status"></p>
          <ul id="eventList" class="event-list"></ul>
        </div>
      </aside>

      <button id="imageDrawerButton" class="drawer-toggle" type="button" aria-pressed="false" aria-label="Open images">☰</button>

      <section class="sheet" aria-label="Printable calendar preview">
        <header class="photo-panel" role="button" tabindex="0" aria-label="Choose photo for this month">
          <img id="photoPreview" alt="" />
          <div id="photoPlaceholder" class="photo-placeholder">Choose a photo</div>
          <div class="calendar-title">
            <span id="titlePreview"></span>
            <strong id="monthPreview"></strong>
          </div>
        </header>

        <div class="calendar-wrap">
          <div id="calendarGrid" class="calendar-grid"></div>
        </div>

        <div id="yearOverview" class="year-overview"></div>
      </section>

      <aside id="imageDrawer" class="image-drawer" aria-label="Image drawer">
        <div class="drawer-header">
          <h2>Images</h2>
          <button id="closeImageDrawerButton" class="icon-button" type="button" aria-label="Close images">×</button>
        </div>
        <p class="hint">Assign, swap, or remove photos for the selected month.</p>
        <label>
          Add images
          <input id="bulkPhotoInput" type="file" accept="image/*" multiple />
        </label>
        <button id="autoAssignImagesButton" type="button">Auto-assign from selected month</button>
        <div id="imageList" class="image-list"></div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
